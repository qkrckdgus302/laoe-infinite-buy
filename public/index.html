<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="무한매수법">
  <meta name="theme-color" content="#1a1230">
  <link rel="manifest" href="/manifest.webmanifest">
  <title>무한매수법 4.0</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Top Bar -->
    <header id="topbar">
      <div class="topbar-left">
        <h1 class="logo">무한매수법 <span class="version-badge">V4.0</span></h1>
      </div>
      <div class="topbar-right">
        <button id="btn-auth" class="icon-btn" title="로그인">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 12 0v1"/></svg>
        </button>
        <button id="btn-settings" class="icon-btn" title="설정">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </header>

    <!-- Session Tabs -->
    <div id="session-tabs" class="session-tabs">
      <div id="tab-list" class="tab-list"></div>
      <button id="btn-add-session" class="tab-add" title="새 세션">+</button>
    </div>

    <!-- Market Info Bar -->
    <div id="market-bar" class="market-bar">
      <div class="market-item" id="market-price">
        <span class="market-label">--</span>
        <span class="market-value">--</span>
      </div>
      <div class="market-item" id="market-fear">
        <span class="market-label">공포탐욕</span>
        <span class="market-value">--</span>
      </div>
      <div class="market-item" id="market-exchange">
        <span class="market-label">USD/KRW</span>
        <span class="market-value">--</span>
      </div>
    </div>

    <!-- View: Empty -->
    <div id="view-empty" class="view" style="display:none;">
      <div class="empty-state">
        <div class="empty-icon">📊</div>
        <h2>무한매수법을 시작하세요</h2>
        <p>새 세션을 만들어 투자를 시작합니다.</p>
        <button id="btn-create-first" class="btn-primary">새 세션 만들기</button>
      </div>
    </div>

    <!-- View: Setup -->
    <div id="view-setup" class="view" style="display:none;">
      <div class="card">
        <h2 class="card-title">세션 설정</h2>
        <div class="form-group">
          <label>세션 이름</label>
          <input type="text" id="setup-name" placeholder="예: TQQQ 20분할" class="input">
        </div>
        <div class="form-group">
          <label>종목</label>
          <div class="btn-group" id="setup-ticker">
            <button class="btn-toggle active" data-value="TQQQ">TQQQ</button>
            <button class="btn-toggle" data-value="SOXL">SOXL</button>
          </div>
        </div>
        <div class="form-group">
          <label>분할 수</label>
          <div class="btn-group" id="setup-splits">
            <button class="btn-toggle" data-value="20">20분할</button>
            <button class="btn-toggle active" data-value="30">30분할</button>
            <button class="btn-toggle" data-value="40">40분할</button>
          </div>
        </div>
        <div class="form-group">
          <label>원금 ($)</label>
          <input type="number" id="setup-capital" placeholder="투자 원금" min="1" class="input">
        </div>
        <div class="form-group">
          <label>목표 수익률 (%)</label>
          <input type="number" id="setup-target" placeholder="미입력 시 기본값" class="input">
          <small class="hint">TQQQ: 15%, SOXL: 20% 기본</small>
        </div>
        <div class="form-group">
          <label>진입 방식</label>
          <div class="btn-group" id="setup-entry">
            <button class="btn-toggle active" data-value="new">새로 시작</button>
            <button class="btn-toggle" data-value="mid">중간 진입</button>
          </div>
        </div>
        <div id="mid-entry-fields" style="display:none;">
          <div class="form-group">
            <label>현재 T값</label>
            <input type="number" id="setup-mid-t" step="0.5" min="0" class="input">
          </div>
          <div class="form-group">
            <label>평균 단가 ($)</label>
            <input type="number" id="setup-mid-avg" step="0.01" min="0" class="input">
          </div>
          <div class="form-group">
            <label>보유 수량</label>
            <input type="number" id="setup-mid-qty" min="0" class="input">
          </div>
        </div>
        <button id="btn-start-session" class="btn-primary full-width">시작하기</button>
      </div>
    </div>

    <!-- View: Dashboard -->
    <div id="view-dashboard" class="view" style="display:none;">
      <div class="summary-grid" id="summary-cards"></div>
      <div class="phase-section" id="phase-badge"></div>
      <div class="card" id="orders-section">
        <h3 class="card-title">📋 오늘의 주문</h3>
        <div id="orders-content"></div>
      </div>
      <div class="action-bar">
        <button id="btn-add-tx" class="btn-primary">거래 기록</button>
        <button id="btn-reverse-toggle" class="btn-secondary" style="display:none;">리버스 모드</button>
      </div>
      <div class="card" id="tx-section">
        <h3 class="card-title">📜 거래 내역</h3>
        <div id="tx-list"></div>
      </div>
      <div class="card" id="chart-section">
        <h3 class="card-title">📈 T값 추이</h3>
        <canvas id="chart-canvas" height="200"></canvas>
      </div>
    </div>
  </div>

  <!-- Modal: Transaction -->
  <div id="modal-tx" class="modal" style="display:none;">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>거래 기록</h3>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>거래일</label>
          <input type="date" id="tx-date" class="input">
        </div>
        <div class="form-group">
          <label>거래 유형</label>
          <div id="tx-type-list" class="tx-type-list"></div>
        </div>
        <div class="form-group" id="tx-price-group">
          <label>매수가 ($)</label>
          <input type="number" id="tx-price" step="0.01" min="0" class="input">
        </div>
        <div class="form-group" id="tx-qty-group">
          <label>매수 수량</label>
          <input type="number" id="tx-qty" min="1" class="input">
        </div>
        <div id="tx-sell-fields" style="display:none;">
          <div class="form-group">
            <label>매도가 ($)</label>
            <input type="number" id="tx-sell-price" step="0.01" min="0" class="input">
          </div>
          <div class="form-group">
            <label>매도 수량</label>
            <input type="number" id="tx-sell-qty" min="1" class="input">
          </div>
        </div>
        <button id="btn-save-tx" class="btn-primary full-width">저장</button>
      </div>
    </div>
  </div>

  <!-- Modal: Auth -->
  <div id="modal-auth" class="modal" style="display:none;">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="auth-title">로그인</h3>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div id="auth-logged-in" style="display:none;">
          <p class="auth-info"><span id="auth-username"></span>님 환영합니다</p>
          <button id="btn-sync" class="btn-secondary full-width" style="margin-bottom:8px;">서버에서 데이터 불러오기</button>
          <button id="btn-logout" class="btn-danger full-width">로그아웃</button>
        </div>
        <div id="auth-form">
          <div class="form-group">
            <label>아이디</label>
            <input type="text" id="auth-id" class="input" autocomplete="username">
          </div>
          <div class="form-group">
            <label>비밀번호</label>
            <input type="password" id="auth-pw" class="input" autocomplete="current-password">
          </div>
          <div id="auth-error" class="error-msg" style="display:none;"></div>
          <button id="btn-login" class="btn-primary full-width">로그인</button>
          <button id="btn-register" class="btn-secondary full-width" style="margin-top:8px;">회원가입</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal: Settings -->
  <div id="modal-settings" class="modal" style="display:none;">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>세션 설정</h3>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>세션 이름</label>
          <input type="text" id="settings-name" class="input">
        </div>
        <div class="form-group">
          <label>종목</label>
          <div class="btn-group" id="settings-ticker">
            <button class="btn-toggle" data-value="TQQQ">TQQQ</button>
            <button class="btn-toggle" data-value="SOXL">SOXL</button>
          </div>
        </div>
        <div class="form-group">
          <label>분할 수</label>
          <div class="btn-group" id="settings-splits">
            <button class="btn-toggle" data-value="20">20</button>
            <button class="btn-toggle" data-value="30">30</button>
            <button class="btn-toggle" data-value="40">40</button>
          </div>
        </div>
        <div class="form-group">
          <label>원금 ($)</label>
          <input type="number" id="settings-capital" class="input">
        </div>
        <div class="form-group">
          <label>목표 수익률 (%)</label>
          <input type="number" id="settings-target" class="input">
        </div>
        <button id="btn-save-settings" class="btn-primary full-width">저장</button>
        <button id="btn-delete-session" class="btn-danger full-width" style="margin-top:8px;">세션 삭제</button>
      </div>
    </div>
  </div>

  <script src="calc.js"></script>
  <script src="api.js"></script>
  <script src="store.js"></script>
  <script src="ui.js"></script>
  <script src="app.js"></script>
</body>
</html>
